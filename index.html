<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>サッカー戦術ボード Pro</title>
    <!-- 外部ライブラリの読み込み -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: fixed;
        }
        #root { height: 100%; display: flex; flex-direction: column; }
        
        .pitch-wrapper {
            flex: 1;
            position: relative;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
        }
        .pitch-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 500px;
            aspect-ratio: 2 / 3;
            background-color: #10b981;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            touch-action: none;
        }
        
        .player-chip {
            user-select: none;
            -webkit-user-select: none;
            cursor: grab;
            transition: transform 0.1s;
            z-index: 20;
        }
        .player-chip:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.2); z-index: 50; }
        
        select { -webkit-appearance: none; appearance: none; }

        /* スクロール防止用のオーバーレイ */
        .no-scroll { position: fixed; overflow: hidden; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="root">アプリを読み込み中...</div>

    <script type="text/babel">
        const { useState, useRef, useCallback, useEffect } = React;

        // --- アイコンコンポーネント ---
        const IconMove = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m13 19-3-3-3 3"/><path d="m19 13-3-3-3 3"/><path d="m11 5 3 3 3-3"/><path d="m5 11 3 3 3-3"/><path d="M10 16V8"/><path d="M16 10h-8"/><path d="M8 14h8"/></svg>;
        const IconPen = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const IconUndo = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>;

        const LineTypeIcons = {
            solid: () => <svg width="24" height="12" viewBox="0 0 24 12"><line x1="2" y1="6" x2="22" y2="6" stroke="currentColor" strokeWidth="2" /></svg>,
            dashed: () => <svg width="24" height="12" viewBox="0 0 24 12"><line x1="2" y1="6" x2="22" y2="6" stroke="currentColor" strokeWidth="2" strokeDasharray="3 2" /></svg>,
            zigzag: () => <svg width="24" height="12" viewBox="0 0 24 12"><path d="M2 9 L6 3 L10 9 L14 3 L18 9 L22 3" fill="none" stroke="currentColor" strokeWidth="2" /></svg>
        };

        const SoccerBall = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full">
                <circle cx="50" cy="50" r="48" fill="white" stroke="#333" strokeWidth="2" />
                <path d="M50 35 L62 45 L58 60 L42 60 L38 45 Z" fill="#333" />
                <path d="M50 35 L50 2 M62 45 L85 38 M58 60 L75 80 M42 60 L25 80 M38 45 L15 38" stroke="#333" strokeWidth="2" />
                <path d="M50 2 L35 12 L65 12 Z" fill="#333" opacity="0.2" />
            </svg>
        );

        // --- 戦術データ ---
        const FORMATIONS = {
            '11': {
                '4-4-2': [{id:'gk',n:'GK',x:50,y:140},{id:'d1',n:2,x:15,y:120},{id:'d2',n:3,x:38,y:120},{id:'d3',n:4,x:62,y:120},{id:'d4',n:5,x:85,y:120},{id:'m1',n:6,x:15,y:95},{id:'m2',n:7,x:38,y:95},{id:'m3',n:8,x:62,y:95},{id:'m4',n:9,x:85,y:95},{id:'f1',n:10,x:38,y:80},{id:'f2',n:11,x:62,y:80}],
                '4-3-3': [{id:'gk',n:'GK',x:50,y:140},{id:'d1',n:2,x:15,y:120},{id:'d2',n:3,x:38,y:120},{id:'d3',n:4,x:62,y:120},{id:'d4',n:5,x:85,y:120},{id:'m1',n:6,x:50,y:105},{id:'m2',n:7,x:30,y:90},{id:'m3',n:8,x:70,y:90},{id:'f1',n:9,x:20,y:75},{id:'f2',n:10,x:50,y:75},{id:'f3',n:11,x:80,y:75}]
            },
            '8': {
                '3-3-1': [{id:'gk',n:'GK',x:50,y:140},{id:'d1',n:2,x:20,y:120},{id:'d2',n:3,x:50,y:120},{id:'d3',n:4,x:80,y:120},{id:'m1',n:5,x:20,y:95},{id:'m2',n:6,x:50,y:95},{id:'m3',n:7,x:80,y:95},{id:'f1',n:8,x:50,y:80}]
            },
            '6': {
                '2-2-1': [{id:'gk',n:'GK',x:50,y:140},{id:'d1',n:2,x:30,y:120},{id:'d2',n:3,x:70,y:120},{id:'m1',n:4,x:30,y:95},{id:'m2',n:5,x:70,y:95},{id:'f1',n:6,x:50,y:80}]
            }
        };

        const COLORS = ['#ffe100', '#ff3b3b', '#3b82f6', '#000000', '#ffffff'];

        function App() {
            const [mode, setMode] = useState('move');
            const [lineType, setLineType] = useState('solid');
            const [playerCount, setPlayerCount] = useState('11');
            const [redFormation, setRedFormation] = useState('4-4-2');
            const [blueFormation, setBlueFormation] = useState('4-4-2');
            const [redPlayers, setRedPlayers] = useState([]);
            const [bluePlayers, setBluePlayers] = useState([]);
            const [ball, setBall] = useState({ x: 50, y: 75 });
            const [lines, setLines] = useState([]);
            const [currentLine, setCurrentLine] = useState(null);
            const [drawColor, setDrawColor] = useState(COLORS[0]);
            const [dragging, setDragging] = useState(null);
            const pitchRef = useRef(null);

            useEffect(() => {
                const rData = FORMATIONS[playerCount][redFormation] || FORMATIONS[playerCount][Object.keys(FORMATIONS[playerCount])[0]];
                const bData = FORMATIONS[playerCount][blueFormation] || FORMATIONS[playerCount][Object.keys(FORMATIONS[playerCount])[0]];
                setRedPlayers(rData.map(p => ({ ...p, teamId: `r_${p.id}` })));
                setBluePlayers(bData.map(p => ({ ...p, y: 150 - p.y, teamId: `b_${p.id}` })));
            }, [playerCount, redFormation, blueFormation]);

            const getCoords = (e) => {
                if (!pitchRef.current) return null;
                const rect = pitchRef.current.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                const x = ((touch.clientX - rect.left) / rect.width) * 100;
                const y = ((touch.clientY - rect.top) / rect.height) * 150;
                return { x: Math.max(0, Math.min(100, x)), y: Math.max(0, Math.min(150, y)) };
            };

            const handleStart = (e) => {
                const { type, id } = e.target.dataset;
                if (mode === 'move' && type) {
                    setDragging({ type, id });
                    if (e.target.setPointerCapture) e.target.setPointerCapture(e.pointerId);
                } else if (mode === 'draw') {
                    const c = getCoords(e);
                    if (c) setCurrentLine({ color: drawColor, type: lineType, points: [c] });
                }
            };

            const handleMove = (e) => {
                const c = getCoords(e);
                if (!c) return;

                if (mode === 'move' && dragging) {
                    if (dragging.type === 'ball') setBall(c);
                    else if (dragging.type === 'red') setRedPlayers(ps => ps.map(p => p.teamId === dragging.id ? {...p, ...c} : p));
                    else if (dragging.type === 'blue') setBluePlayers(ps => ps.map(p => p.teamId === dragging.id ? {...p, ...c} : p));
                } else if (mode === 'draw' && currentLine) {
                    // 点が近すぎる場合は追加しない（ギザギザ用）
                    const last = currentLine.points[currentLine.points.length - 1];
                    const dist = Math.sqrt((c.x - last.x)**2 + (c.y - last.y)**2);
                    if (dist > 1.5) {
                        setCurrentLine(prev => ({ ...prev, points: [...prev.points, c] }));
                    }
                }
            };

            const handleEnd = (e) => {
                if (currentLine) setLines(prev => [...prev, currentLine]);
                if (dragging && e.target.releasePointerCapture) e.target.releasePointerCapture(e.pointerId);
                setDragging(null);
                setCurrentLine(null);
            };

            const generateZigzagPath = (points) => {
                if (points.length < 2) return "";
                let d = `M ${points[0].x} ${points[0].y}`;
                const amplitude = 1.2;
                
                for (let i = 1; i < points.length; i++) {
                    const p1 = points[i-1];
                    const p2 = points[i];
                    
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const angle = Math.atan2(dy, dx);
                    
                    // 中間点に垂直方向のオフセットを加える
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const offset = i % 2 === 0 ? amplitude : -amplitude;
                    
                    const nx = midX - Math.sin(angle) * offset;
                    const ny = midY + Math.cos(angle) * offset;
                    
                    d += ` L ${nx} ${ny} L ${p2.x} ${p2.y}`;
                }
                return d;
            };

            const renderPath = (line) => {
                if (line.type === 'zigzag') return generateZigzagPath(line.points);
                return line.points.map((p, j) => `${j===0?'M':'L'} ${p.x} ${p.y}`).join(' ');
            };

            return (
                <React.Fragment>
                    {/* 上部ツールバー */}
                    <div className="p-2 sm:p-3 flex justify-between items-center border-b border-slate-200 bg-white z-30 shadow-sm shrink-0">
                        <div className="flex bg-slate-100 rounded-xl p-1 border border-slate-200">
                            <button onClick={() => setMode('move')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all ${mode === 'move' ? 'bg-white text-emerald-600 shadow-sm border border-slate-200' : 'text-slate-500'}`}>
                                <IconMove /><span>移動</span>
                            </button>
                            <button onClick={() => setMode('draw')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all ${mode === 'draw' ? 'bg-white text-emerald-600 shadow-sm border border-slate-200' : 'text-slate-500'}`}>
                                <IconPen /><span>描画</span>
                            </button>
                        </div>
                        
                        <div className="flex items-center gap-1.5">
                            {mode === 'draw' && (
                                <div className="flex bg-slate-100 rounded-lg p-1 border border-slate-200 mr-2">
                                    {Object.keys(LineTypeIcons).map(t => (
                                        <button key={t} onClick={() => setLineType(t)} className={`p-1.5 rounded-md ${lineType === t ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-400'}`}>
                                            {LineTypeIcons[t]()}
                                        </button>
                                    ))}
                                </div>
                            )}
                            <button onClick={() => setLines(l => l.slice(0, -1))} className="p-2 bg-slate-50 border border-slate-200 rounded-xl text-slate-600 active:bg-slate-200"><IconUndo /></button>
                            <button onClick={() => setLines([])} className="p-2 bg-slate-50 border border-slate-200 rounded-xl text-rose-500 active:bg-rose-100"><IconTrash /></button>
                        </div>
                    </div>

                    {/* 設定バー */}
                    <div className="p-2 bg-slate-50 flex flex-wrap justify-center gap-2 text-xs border-b border-slate-200 z-20 shrink-0 shadow-inner">
                        <select value={playerCount} onChange={e => setPlayerCount(e.target.value)} className="bg-white border border-slate-200 px-2 py-1.5 rounded-lg font-bold">
                            <option value="11">11人制</option><option value="8">8人制</option><option value="6">6人制</option>
                        </select>
                        <div className="flex gap-1.5">
                            <div className="bg-white px-2 py-1.5 rounded-lg border border-rose-200 flex items-center">
                                <span className="mr-1 text-rose-600 font-bold">赤:</span>
                                <select value={redFormation} onChange={e => setRedFormation(e.target.value)} className="bg-transparent outline-none">
                                    {Object.keys(FORMATIONS[playerCount] || {}).map(f => <option key={f} value={f}>{f}</option>)}
                                </select>
                            </div>
                            <div className="bg-white px-2 py-1.5 rounded-lg border border-blue-200 flex items-center">
                                <span className="mr-1 text-blue-600 font-bold">青:</span>
                                <select value={blueFormation} onChange={e => setBlueFormation(e.target.value)} className="bg-transparent outline-none">
                                    {Object.keys(FORMATIONS[playerCount] || {}).map(f => <option key={f} value={f}>{f}</option>)}
                                </select>
                            </div>
                        </div>
                        {mode === 'draw' && (
                            <div className="flex gap-1.5 items-center pl-1">
                                {COLORS.map(c => <div key={c} onClick={() => setDrawColor(c)} className={`w-5 h-5 rounded-full border-2 ${drawColor === c ? 'border-slate-800 scale-110' : 'border-transparent'}`} style={{background: c}} />)}
                            </div>
                        )}
                    </div>

                    {/* ピッチ表示エリア */}
                    <div className="pitch-wrapper">
                        <div className="pitch-container" ref={pitchRef}
                             onPointerDown={handleStart} onPointerMove={handleMove} onPointerUp={handleEnd}
                             onPointerLeave={handleEnd}>
                            
                            {/* フィールドデザイン */}
                            <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 150" preserveAspectRatio="none">
                                <rect width="100" height="150" fill="#10b981" />
                                {[...Array(10)].map((_, i) => (
                                    <rect key={i} x="0" y={i * 15} width="100" height="7.5" fill="rgba(255,255,255,0.05)" />
                                ))}
                                <g stroke="white" strokeWidth="0.6" fill="none" opacity="0.8">
                                    <rect x="2" y="2" width="96" height="146" />
                                    <line x1="2" y1="75" x2="98" y2="75" />
                                    <circle cx="50" cy="75" r="12" />
                                    <circle cx="50" cy="75" r="0.5" fill="white" />
                                    <rect x="25" y="2" width="50" height="18" />
                                    <rect x="25" y="130" width="50" height="18" />
                                    <path d="M 40 20 A 10 10 0 0 0 60 20" />
                                    <path d="M 40 130 A 10 10 0 0 1 60 130" />
                                </g>
                            </svg>

                            {/* 描画レイヤー */}
                            <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 150" preserveAspectRatio="none">
                                {lines.map((l, i) => (
                                    <path key={i} 
                                          d={renderPath(l)} 
                                          stroke={l.color} 
                                          strokeWidth="1.5" 
                                          fill="none" 
                                          strokeDasharray={l.type === 'dashed' ? "4 3" : "none"}
                                          strokeLinecap="round" 
                                          strokeLinejoin="round" />
                                ))}
                                {currentLine && (
                                    <path d={renderPath(currentLine)} 
                                          stroke={currentLine.color} 
                                          strokeWidth="1.5" 
                                          fill="none" 
                                          strokeDasharray={currentLine.type === 'dashed' ? "4 3" : "none"}
                                          strokeLinecap="round" 
                                          strokeLinejoin="round" />
                                )}
                            </svg>

                            {/* 選手・ボール */}
                            {redPlayers.map(p => (
                                <div key={p.teamId} data-type="red" data-id={p.teamId} className="player-chip absolute flex items-center justify-center rounded-full bg-rose-600 border-2 border-white text-white font-black shadow-md"
                                     style={{width:'9%',aspectRatio:'1/1',left:`${p.x}%`,top:`${(p.y/150)*100}%`,transform:'translate(-50%, -50%)',fontSize:'min(3.5vw, 12px)'}}>{p.n}</div>
                            ))}
                            {bluePlayers.map(p => (
                                <div key={p.teamId} data-type="blue" data-id={p.teamId} className="player-chip absolute flex items-center justify-center rounded-full bg-blue-600 border-2 border-white text-white font-black shadow-md"
                                     style={{width:'9%',aspectRatio:'1/1',left:`${p.x}%`,top:`${(p.y/150)*100}%`,transform:'translate(-50%, -50%)',fontSize:'min(3.5vw, 12px)'}}>{p.n}</div>
                            ))}
                            <div data-type="ball" data-id="ball" className="absolute w-[7%] aspect-square cursor-grab active:cursor-grabbing transition-transform" 
                                 style={{left:`${ball.x}%`,top:`${(ball.y/150)*100}%`,transform:'translate(-50%, -50%)'}}>
                                <SoccerBall />
                            </div>
                        </div>
                    </div>
                    
                    {/* 下部余白 */}
                    <div className="h-[env(safe-area-inset-bottom)] bg-white"></div>
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
