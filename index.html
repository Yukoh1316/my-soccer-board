<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>サッカー戦術ボード</title>
    <!-- 外部ライブラリの読み込み -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #ffffff; overflow: hidden; touch-action: none; font-family: sans-serif; }
        .pitch-container { aspect-ratio: 2/3; position: relative; width: 100%; max-width: 600px; margin: 0 auto; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        html, body { height: 100%; position: fixed; width: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useCallback, useEffect } = React;

        // --- アイコン (SVG形式) ---
        const IconMove = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m13 19-3-3-3 3"/><path d="m19 13-3-3-3 3"/><path d="m11 5 3 3 3-3"/><path d="m5 11 3 3 3-3"/><path d="M10 16V8"/><path d="M16 10h-8"/><path d="M8 14h8"/></svg>;
        const IconPen = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"/></svg>;
        const IconTrash = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const IconUndo = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>;

        // --- フォーメーションデータ ---
        const FORMATIONS = {
            '11': {
                '4-4-2': [{id:'gk',n:'GK',x:50,y:92},{id:'d1',n:2,x:20,y:80},{id:'d2',n:3,x:40,y:82},{id:'d3',n:4,x:60,y:82},{id:'d4',n:5,x:80,y:80},{id:'m1',n:6,x:20,y:65},{id:'m2',n:7,x:40,y:67},{id:'m3',n:8,x:60,y:67},{id:'m4',n:9,x:80,y:65},{id:'f1',n:10,x:40,y:55},{id:'f2',n:11,x:60,y:55}],
                '4-3-3': [{id:'gk',n:'GK',x:50,y:92},{id:'d1',n:2,x:15,y:80},{id:'d2',n:3,x:35,y:82},{id:'d3',n:4,x:65,y:82},{id:'d4',n:5,x:85,y:80},{id:'m1',n:6,x:50,y:72},{id:'m2',n:7,x:30,y:62},{id:'m3',n:8,x:70,y:62},{id:'f1',n:9,x:20,y:52},{id:'f2',n:10,x:50,y:50},{id:'f3',n:11,x:80,y:52}]
            },
            '8': {
                '3-3-1': [{id:'gk',n:'GK',x:50,y:92},{id:'d1',n:2,x:20,y:80},{id:'d2',n:3,x:50,y:82},{id:'d3',n:4,x:80,y:80},{id:'m1',n:5,x:20,y:65},{id:'m2',n:6,x:50,y:67},{id:'m3',n:7,x:80,y:65},{id:'f1',n:8,x:50,y:55}]
            },
            '6': {
                '2-2-1': [{id:'gk',n:'GK',x:50,y:92},{id:'d1',n:2,x:30,y:80},{id:'d2',n:3,x:70,y:80},{id:'m1',n:4,x:30,y:65},{id:'m2',n:5,x:70,y:65},{id:'f1',n:6,x:50,y:52}]
            }
        };

        const COLORS = ['#ffe100', '#ff3b3b', '#3b82f6', '#000000', '#888888'];

        function App() {
            const [mode, setMode] = useState('move');
            const [playerCount, setPlayerCount] = useState('11');
            const [redFormation, setRedFormation] = useState('4-4-2');
            const [blueFormation, setBlueFormation] = useState('4-4-2');
            const [redPlayers, setRedPlayers] = useState([]);
            const [bluePlayers, setBluePlayers] = useState([]);
            const [ball, setBall] = useState({ x: 50, y: 50 });
            const [lines, setLines] = useState([]);
            const [currentLine, setCurrentLine] = useState(null);
            const [drawColor, setDrawColor] = useState(COLORS[0]);
            const [dragging, setDragging] = useState(null);
            const pitchRef = useRef(null);

            useEffect(() => {
                const rData = FORMATIONS[playerCount][redFormation] || FORMATIONS[playerCount][Object.keys(FORMATIONS[playerCount])[0]];
                const bData = FORMATIONS[playerCount][blueFormation] || FORMATIONS[playerCount][Object.keys(FORMATIONS[playerCount])[0]];
                setRedPlayers(rData.map(p => ({ ...p, teamId: `r_${p.id}` })));
                setBluePlayers(bData.map(p => ({ ...p, y: 100 - p.y, teamId: `b_${p.id}` })));
            }, [playerCount, redFormation, blueFormation]);

            const getCoords = (e) => {
                const rect = pitchRef.current.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                return {
                    x: Math.max(0, Math.min(100, ((touch.clientX - rect.left) / rect.width) * 100)),
                    y: Math.max(0, Math.min(100, ((touch.clientY - rect.top) / rect.height) * 100))
                };
            };

            const handleStart = (e) => {
                const { type, id } = e.target.dataset;
                if (mode === 'move' && type) {
                    setDragging({ type, id });
                } else if (mode === 'draw') {
                    setCurrentLine({ color: drawColor, points: [getCoords(e)] });
                }
            };

            const handleMove = (e) => {
                if (mode === 'move' && dragging) {
                    const c = getCoords(e);
                    if (dragging.type === 'ball') setBall(c);
                    else if (dragging.type === 'red') setRedPlayers(ps => ps.map(p => p.teamId === dragging.id ? {...p, ...c} : p));
                    else if (dragging.type === 'blue') setBluePlayers(ps => ps.map(p => p.teamId === dragging.id ? {...p, ...c} : p));
                } else if (mode === 'draw' && currentLine) {
                    setCurrentLine(prev => ({ ...prev, points: [...prev.points, getCoords(e)] }));
                }
            };

            const handleEnd = () => {
                if (currentLine) setLines(prev => [...prev, currentLine]);
                setDragging(null);
                setCurrentLine(null);
            };

            return (
                <div className="flex flex-col h-screen w-full bg-white text-slate-800 overflow-hidden">
                    <div className="p-2 flex justify-between items-center border-b border-slate-200 z-20">
                        <div className="flex bg-slate-100 rounded-lg p-1 border border-slate-200">
                            <button onClick={() => setMode('move')} className={`flex items-center gap-1 px-3 py-1.5 rounded-md text-sm font-medium ${mode === 'move' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}><IconMove /><span>移動</span></button>
                            <button onClick={() => setMode('draw')} className={`flex items-center gap-1 px-3 py-1.5 rounded-md text-sm font-medium ${mode === 'draw' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}><IconPen /><span>描画</span></button>
                        </div>
                        <div className="flex gap-2">
                            {mode === 'draw' && COLORS.map(c => <div key={c} onClick={() => setDrawColor(c)} className={`w-5 h-5 rounded-full border-2 ${drawColor === c ? 'border-slate-400' : 'border-transparent'}`} style={{background: c}} />)}
                            <button onClick={() => setLines(l => l.slice(0, -1))} className="p-2 bg-slate-50 border rounded shadow-sm"><IconUndo /></button>
                            <button onClick={() => setLines([])} className="p-2 bg-slate-50 border rounded shadow-sm text-rose-500"><IconTrash /></button>
                        </div>
                    </div>

                    <div className="p-2 bg-slate-50 flex flex-wrap justify-center gap-2 text-xs border-b border-slate-200 z-10">
                        <select value={playerCount} onChange={e => setPlayerCount(e.target.value)} className="bg-white border px-2 py-1 rounded font-bold shadow-sm">
                            <option value="11">11人制</option><option value="8">8人制</option><option value="6">6人制</option>
                        </select>
                        <div className="flex gap-2">
                            <div className="bg-white px-2 py-1 rounded border border-rose-200 flex items-center">
                                <span className="mr-1 text-rose-600 font-bold">赤:</span>
                                <select value={redFormation} onChange={e => setRedFormation(e.target.value)} className="bg-transparent outline-none">
                                    {Object.keys(FORMATIONS[playerCount]).map(f => <option key={f} value={f}>{f}</option>)}
                                </select>
                            </div>
                            <div className="bg-white px-2 py-1 rounded border border-blue-200 flex items-center">
                                <span className="mr-1 text-blue-600 font-bold">青:</span>
                                <select value={blueFormation} onChange={e => setBlueFormation(e.target.value)} className="bg-transparent outline-none">
                                    {Object.keys(FORMATIONS[playerCount]).map(f => <option key={f} value={f}>{f}</option>)}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 flex justify-center items-center p-2">
                        <div className="pitch-container bg-emerald-600 rounded-lg shadow-2xl overflow-hidden touch-none" ref={pitchRef}
                             onMouseDown={handleStart} onMouseMove={handleMove} onMouseUp={handleEnd}
                             onTouchStart={handleStart} onTouchMove={handleMove} onTouchEnd={handleEnd}>
                            <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 150">
                                <g stroke="white" strokeWidth="0.5" fill="none" opacity="0.6">
                                    <rect x="2" y="2" width="96" height="146" /><line x1="2" y1="75" x2="98" y2="75" /><circle cx="50" cy="75" r="10" />
                                    <rect x="22" y="2" width="56" height="22" /><rect x="22" y="126" width="56" height="22" />
                                </g>
                                {lines.map((l, i) => <path key={i} d={l.points.map((p, j) => `${j===0?'M':'L'} ${p.x} ${p.y}`).join(' ')} stroke={l.color} strokeWidth="1" fill="none" strokeLinecap="round" />)}
                                {currentLine && <path d={currentLine.points.map((p, j) => `${j===0?'M':'L'} ${p.x} ${p.y}`).join(' ')} stroke={currentLine.color} strokeWidth="1" fill="none" strokeLinecap="round" />}
                            </svg>
                            {redPlayers.map(p => (
                                <div key={p.teamId} data-type="red" data-id={p.teamId} className="absolute flex items-center justify-center rounded-full bg-rose-600 border border-rose-700 text-white font-bold shadow-lg"
                                     style={{width:'6.5%',aspectRatio:'1/1',left:`${p.x}%`,top:`${p.y}%`,transform:'translate(-50%,-50%)',fontSize:'10px'}}>{p.n}</div>
                            ))}
                            {bluePlayers.map(p => (
                                <div key={p.teamId} data-type="blue" data-id={p.teamId} className="absolute flex items-center justify-center rounded-full bg-blue-600 border border-blue-700 text-white font-bold shadow-lg"
                                     style={{width:'6.5%',aspectRatio:'1/1',left:`${p.x}%`,top:`${p.y}%`,transform:'translate(-50%,-50%)',fontSize:'10px'}}>{p.n}</div>
                            ))}
                            <div data-type="ball" className="absolute bg-white rounded-full border border-slate-900 shadow-md" style={{width:'4.5%',aspectRatio:'1/1',left:`${ball.x}%`,top:`${ball.y}%`,transform:'translate(-50%,-50%)'}} />
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
